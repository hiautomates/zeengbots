server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # URLs limpias: /pricing sirve pricing.html, /cases sirve cases.html, etc.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Caché larga para imágenes y CSS (cambian poco)
    location ~* \.(png|jpg|jpeg|webp|svg|ico|css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Página de error 404 → redirigir al inicio
    error_page 404 /index.html;
}
